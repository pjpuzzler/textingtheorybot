<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="post.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"
    />
    <title>Texting Theory</title>
  </head>

  <body>
    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <!-- Main post view -->
    <div class="post" id="post" style="display: none">
      <div class="canvas" id="canvas">
        <img class="canvas-img" id="canvas-img" alt="" />
        <div class="badges" id="badges"></div>
        <div class="post-menu" id="post-menu">
          <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="menu-dropdown hidden" id="menu-dropdown">
            <!-- <button class="menu-item" id="menu-info" type="button">Info</button> -->
            <button class="menu-item" id="menu-create" type="button">Create</button>
            <button class="menu-item hidden" id="menu-edit" type="button">Edit</button>
            <button class="menu-item hidden" id="menu-inspect" type="button">Inspect</button>
          </div>
        </div>
        <button
          class="badge-visibility"
          id="badge-vis-toggle"
          aria-label="Hide badges"
        >
          👁
        </button>
        <div class="page-chip" id="page-chip" style="display: none">1/1</div>
        <div class="image-nav" id="image-nav" style="display: none">
          <button class="img-nav-btn" id="img-prev">‹</button>
          <div class="img-dots" id="img-dots"></div>
          <button class="img-nav-btn" id="img-next">›</button>
        </div>
      </div>

      <div class="inspect-footer hidden" id="inspect-footer">
        <button class="inspect-footer-btn" id="inspect-elo-btn" type="button">
          Elo
        </button>
      </div>

      <!-- ELO section -->
      <div class="elo" id="elo" style="display: none">
        <div class="elo-row">
          <div class="elo-slider-wrap">
            <div class="elo-bubble" id="elo-bubble" aria-hidden="true">
              <span class="elo-bubble-text" id="elo-bubble-text">1000 Elo</span>
            </div>
            <input
              type="range"
              class="elo-slider"
              id="elo-slider"
              min="100"
              max="3000"
              step="50"
              value="1000"
            />
            <div class="elo-tick" id="elo-gm-tick">GM</div>
          </div>
          <button class="elo-btn" id="elo-btn">Vote</button>
        </div>
      </div>
      <div class="elo elo-login" id="elo-login" style="display: none">
        <div class="elo-login-text" id="elo-login-text">Log in to vote</div>
      </div>
    </div>

    <!-- Create placeholder (no post data) -->
    <div class="create-prompt" id="create-prompt" style="display: none">
      <img src="/assets/logo.png" alt="Texting Theory" class="create-logo" />
      <div class="create-title">Texting Theory</div>
      <button class="create-btn" id="create-btn">Create Post</button>
    </div>

    <!-- Classification Picker -->
    <div class="picker-overlay" id="picker-overlay">
      <div class="picker-bg" id="picker-bg"></div>
      <div class="picker-sheet">
        <div class="picker-handle"></div>
        <div class="picker-title" id="picker-title">
          Vote for Classification (Best → Worst)
        </div>
        <div class="picker-body" id="picker-body"></div>
      </div>
    </div>

    <div class="inspector-overlay" id="inspector-overlay">
      <div class="inspector-bg" id="inspector-bg"></div>
      <div class="inspector-sheet">
        <div class="inspector-header">
          <div class="inspector-heading-block">
            <div class="inspector-title" id="inspector-title">Inspect Votes</div>
            <div class="inspector-meta" id="inspector-meta"></div>
          </div>
          <button class="inspector-close" id="inspector-close" type="button">
            Back
          </button>
        </div>
        <div class="inspector-body" id="inspector-body"></div>
      </div>
    </div>

    <div class="vote-hint hidden" id="vote-hint">
      Tap a badge to open the vote drawer.
    </div>

    <script type="module" src="post.js" defer></script>
  </body>
</html>
